<body class="d-flex justify-content-center align-items-center vh-100">

    <main class="calculator-container d-flex flex-column shadow-lg position-relative overflow-hidden w-100 h-100" style="max-width: 400px; max-height: 850px;">
        
        <header class="d-flex justify-content-between align-items-center p-3 p-sm-4">
            <div class="d-flex align-items-center gap-2">
                <div class="brand-icon d-flex justify-content-center align-items-center rounded-3 text-white" style="width: 36px; height: 36px; background-color: #fba919;">
                    <i class="bi bi-calculator fs-5"></i>
                </div>
                <div class="lh-sm">
                    <h1 class="h6 mb-0 fw-bold">Calculator</h1>
                    <span id="mode-subtitle" class="small text-secondary">Standard Mode</span>
                </div>
            </div>
            
            <button id="theme-toggle" class="btn btn-secondary rounded-circle d-flex justify-content-center align-items-center border-0" style="width: 40px; height: 40px;" aria-label="Toggle Theme">
                <span id="theme-icon" class="fs-6"><i class="bi bi-moon"></i></span>
            </button>
        </header>

        <section class="display-area flex-grow-1 d-flex flex-column justify-content-end align-items-end p-4 text-break">
            <div id="previous-operand" class="fs-4 text-secondary mb-1" style="min-height: 2rem;"></div>
            <div id="current-operand" class="display-1 fw-light lh-1 text-body">0</div>
        </section>

        <section id="keypad-area" class="flex-shrink-0 px-3 pb-2">
            
            <div id="standard-mode" class="mode-view active">
                <div class="row g-2 mb-2">
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-action" id="clear" style="height: 9vh; max-height: 75px;">C</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-action" id="backspace" style="height: 9vh; max-height: 75px;">⌫</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-action" id="percent" style="height: 9vh; max-height: 75px;">%</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-3 custom-operator" data-action="divide" style="height: 9vh; max-height: 75px;">÷</button></div>
                </div>
                
                <div class="row g-2 mb-2">
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">7</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">8</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">9</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-3 custom-operator" data-action="multiply" style="height: 9vh; max-height: 75px;">×</button></div>
                </div>
                
                <div class="row g-2 mb-2">
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">4</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">5</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">6</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-3 custom-operator" data-action="subtract" style="height: 9vh; max-height: 75px;">-</button></div>
                </div>
                
                <div class="row g-2 mb-2">
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">1</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">2</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number" style="height: 9vh; max-height: 75px;">3</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-3 custom-operator" data-action="add" style="height: 9vh; max-height: 75px;">+</button></div>
                </div>
                
                <div class="row g-2">
                    <div class="col-6"><button class="btn w-100 rounded-pill fs-4 text-start ps-5 custom-number zero-btn" style="height: 9vh; max-height: 75px;">0</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-4 custom-number decimal" style="height: 9vh; max-height: 75px;">.</button></div>
                    <div class="col-3"><button class="btn w-100 rounded-pill fs-3 custom-operator" id="equals" style="height: 9vh; max-height: 75px;">=</button></div>
                </div>
            </div>

            <div id="scientific-mode" class="mode-view d-none"></div>
            <div id="loan-mode" class="mode-view d-none"></div>
            <div id="currency-mode" class="mode-view d-none"></div>
        </section>

        <nav class="bottom-nav d-flex justify-content-around align-items-center mx-3 mb-3 p-2 rounded-4" style="background-color: var(--bs-body-bg); flex: 0 0 70px;">
            <button class="btn nav-btn border-0 d-flex flex-column align-items-center text-warning" data-mode="standard">
                <span class="fs-5"><i class="bi bi-calculator"></i></span>
                <span class="fw-medium" style="font-size: 0.75rem;">Standard</span>
            </button>
            <button class="btn nav-btn border-0 d-flex flex-column align-items-center text-secondary" data-mode="scientific">
                <span class="fs-5"><i class="bi bi-plus-slash-minus fs-4"></i></span>
                <span class="fw-medium" style="font-size: 0.75rem;">Scientific</span>
            </button>
            <button class="btn nav-btn border-0 d-flex flex-column align-items-center text-secondary" data-mode="loan">
                <span class="fs-5"><i class="bi bi-currency-dollar"></i></span>
                <span class="fw-medium" style="font-size: 0.75rem;">Loan</span>
            </button>
            <button class="btn nav-btn border-0 d-flex flex-column align-items-center text-secondary" data-mode="currency">
                <span class="fs-5"><i class="bi bi-arrow-left-right"></i></span>
                <span class="fw-medium" style="font-size: 0.75rem;">Currency</span>
            </button>
        </nav>
    </main>

    <script src="modes/currency.js"></script>
