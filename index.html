    <style>
        :root {
            --bg-color: #0a0b10;
            --panel-bg: rgba(18, 20, 32, 0.85);
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff007f;
            --neon-purple: #9d4edd;
            --neon-amber: #ffaa00;
            --text-color: #e2e8f0;
            --grid-color: rgba(0, 240, 255, 0.04);
            --glow-strength: 0 0 12px;
        }

        [data-theme="amber"] {
            --neon-cyan: #ffaa00;
            --neon-magenta: #ff5500;
            --neon-purple: #d4af37;
            --grid-color: rgba(255, 170, 0, 0.04);
        }

        [data-theme="matrix"] {
            --neon-cyan: #39ff14;
            --neon-magenta: #00ff66;
            --neon-purple: #008000;
            --grid-color: rgba(57, 255, 20, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Interactive Canvas Background */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Shell */
        .quantum-shell {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            box-shadow: var(--glow-strength) var(--neon-cyan), inset 0 0 20px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(15px);
            transition: all 0.5s ease;
        }

        /* Top Control Bar */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 240, 255, 0.3);
            padding-bottom: 10px;
        }

        .brand {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: var(--glow-strength) var(--neon-cyan);
            font-weight: bold;
        }

        .theme-selector {
            display: flex;
            gap: 8px;
        }

        .theme-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid #fff;
            transition: transform 0.2s;
        }

        .theme-dot:hover {
            transform: scale(1.3);
        }

        .dot-cyan { background: #00f0ff; }
        .dot-amber { background: #ffaa00; }
        .dot-matrix { background: #39ff14; }

        /* Display Terminal */
        .terminal-display {
            background: rgba(5, 6, 10, 0.95);
            border: 1px solid var(--neon-magenta);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.15);
        }

        .terminal-display::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }

        .history-log {
            height: 40px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .history-log::-webkit-scrollbar {
            display: none;
        }

        .main-line {
            font-size: 2rem;
            color: var(--neon-cyan);
            text-shadow: var(--glow-strength) var(--neon-cyan);
            text-align: right;
            margin-top: 5px;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .main-line::-webkit-scrollbar {
            display: none;
        }

        /* Grid Layout */
        .grid-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Interactive Buttons */
        .btn {
            background: rgba(20, 22, 37, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            padding: 18px 0;
            font-size: 1.15rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.3s;
            pointer-events: none;
        }

        .btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
            color: var(--neon-cyan);
            transform: translateY(-2px);
        }

        .btn:hover::after {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .btn:active {
            transform: translateY(1px) scale(0.97);
        }

        /* Button Variant Styling */
        .btn-op {
            color: var(--neon-magenta);
            border-color: rgba(255, 0, 127, 0.2);
        }

        .btn-op:hover {
            border-color: var(--neon-magenta);
            color: var(--neon-magenta);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
        }

        .btn-fn {
            color: var(--neon-purple);
            border-color: rgba(157, 78, 221, 0.2);
            font-size: 0.95rem;
        }

        .btn-fn:hover {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.3);
        }

        .btn-eq {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(255, 0, 127, 0.2));
            border: 1px solid var(--neon-cyan);
            color: #fff;
            text-shadow: 0 0 5px #fff;
        }

        .btn-eq:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.4), rgba(255, 0, 127, 0.4));
            box-shadow: var(--glow-strength) var(--neon-cyan);
        }

        /* Status Indicator */
        .status-panel {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0240, 255, 0.7); }
            70% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 4px rgba(0, 240, 255, 0); }
            100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }
    </style>
</head>

    <script>
        // --- Canvas Background Animation ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Ripple {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 2;
                this.maxRadius = Math.random() * 150 + 100;
                this.alpha = 1;
                this.color = color;
                this.speed = Math.random() * 2 + 2;
            }
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
            }
            draw() {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function triggerRipple(x, y) {
            const styles = getComputedStyle(document.documentElement);
            const color = styles.getPropertyValue('--neon-cyan').trim();
            ripples.push(new Ripple(x, y, color));
            if (ripples.length > 15) ripples.shift();
        }

        function drawGrid() {
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid-color').trim();
            ctx.lineWidth = 1;
            const size = 50;
            for (let x = 0; x < width; x += size) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += size) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 11, 16, 0.2)';
            ctx.fillRect(0, 0, width, height);

            drawGrid();

            ripples.forEach((ripple, index) => {
                ripple.update();
                ripple.draw();
                if (ripple.alpha <= 0) {
                    ripples.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }
        animate();

        // --- Audio Feedback Engine (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audio-status').innerText = "Audio: On";
            }
        }

        function playBeep(freq, type = 'sine', duration = 0.25) {
            initAudio();
            if (!audioCtx || audioCtx.state === 'suspended') return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Theme Engine ---
        function setTheme(theme) {
            playBeep(600, 'sawtooth', 0.15);
            if (theme === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        }

        // --- Calculator Core Logic ---
        const display = document.getElementById('display');
        const history = document.getElementById('history');

        let currentInput = "0";
        let expression = "";
        let resetDisplayOnNextInput = false;

        function updateDisplay() {
            display.innerText = currentInput;
            history.innerText = expression || "SYS READY";
            history.scrollTop = history.scrollHeight;
        }

        function inputNum(num) {
            initAudio();
            playBeep(440, 'triangle');
            
            if (currentInput === "0" && num !== "." || resetDisplayOnNextInput) {
                currentInput = num;
                resetDisplayOnNextInput = false;
            } else {
                if (num === "." && currentInput.includes(".")) return;
                currentInput += num;
            }
            updateDisplay();
        }

        function inputOp(op) {
            initAudio();
            playBeep(520, 'square');

            if (resetDisplayOnNextInput) {
                expression = currentInput + " " + op + " ";
                resetDisplayOnNextInput = false;
            } else {
                if (currentInput !== "") {
                    expression += currentInput + " " + op + " ";
                } else if (expression !== "") {
                    // Replace last operator if clicked consecutively
                    expression = expression.slice(0, -3) + " " + op + " ";
                }
            }
            currentInput = "0";
            updateDisplay();
        }

        function clearAll() {
            initAudio();
            playBeep(220, 'sine', 0.2);
            currentInput = "0";
            expression = "";
            updateDisplay();
        }

        function backspace() {
            initAudio();
            playBeep(300, 'sine');
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = "0";
            }
            updateDisplay();
        }

        function calculate() {
            initAudio();
            if (expression === "") return;

            let finalExpression = expression + currentInput;
            
            // Safe evaluation using basic math parser logic
            try {
                // Formatting for math calculation
                let sanitized = finalExpression.replace(/[^0-9+\-*/%.() ]/g, '');
                
                // Perform computation securely without standard eval vulnerability
                let result = Function(`"use strict"; return (${sanitized})`)();
                
                if (result === Infinity || isNaN(result)) {
                    throw new Error("Math Error");
                }

                playBeep(880, 'sine', 0.15);
                expression = finalExpression + " =";
                currentInput = Number(result.toFixed(8)).toString(); // Limit float issues
                resetDisplayOnNextInput = true;
            } catch (error) {
                playBeep(150, 'sawtooth', 0.3);
                expression = "ERROR";
                currentInput = "0";
                resetDisplayOnNextInput = true;
            }
            updateDisplay();
        }

        // Capture physical keyboard inputs
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9' || e.key === '.') {
                inputNum(e.key);
            } else if (['+', '-', '*', '/', '%'].includes(e.key)) {
                inputOp(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Backspace') {
                backspace();
            } else if (e.key === 'Escape') {
                clearAll();
            }
        });

        // Click ripple trigger
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', (e) => {
                triggerRipple(e.clientX, e.clientY);
            });
        });
    </script>
</body>
</html>
